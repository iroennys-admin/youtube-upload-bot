name: 🤖 YouTube Upload Bot

on:
  schedule:
    # Cada 4 horas - el bot corre 3h30m, se apaga y reinicia
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Para arrancar manualmente

concurrency:
  group: bot
  cancel-in-progress: false  # No cancelar la ejecución anterior

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 215  # ~3h35m, un poco menos de 4h para el próximo cron

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Instalar ffmpeg + dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install -r requirements.txt

      - name: 🚀 Arrancar bot
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID: ${{ secrets.OWNER_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          echo "Bot iniciado - va a correr por ~3.5 horas"
          echo "Cualquier video que le mandes a Telegram lo procesa"
          python bot.py
